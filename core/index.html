<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE FONTANA ENGINE CORE // ANTAGONIST VAULT</title>
    <style>
        body {
            font-family: 'Courier New', monospace;
            background: #000000;
            color: #ffffff;
            padding: 50px 20px;
            margin: 0;
            letter-spacing: -0.5px;
        }
        .vault-container {
            max-width: 800px;
            margin: 0 auto;
            background: #000000;
            border: 3px solid #ffffff;
            padding: 40px;
            position: relative;
        }
        h1 {
            font-family: 'Courier New', monospace;
            font-weight: 900;
            color: #ffffff;
            border-bottom: 3px solid #ffffff;
            padding-bottom: 15px;
            margin-top: 0;
            font-size: 26px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        h2 {
            font-family: 'Courier New', monospace;
            font-weight: 900;
            color: #00ff66;
            font-size: 15px;
            margin-top: 0;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .matrix-grid { display: grid; grid-template-columns: 1fr; gap: 40px; margin-top: 30px; }
        .vamp-card {
            background: #050505;
            border: 1px solid #222222;
            border-radius: 0px;
            padding: 30px;
        }
        .vamp-card:hover {
            border-color: #00ff66;
        }
        .status-strip {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #111111;
            padding: 12px 20px;
            margin-bottom: 35px;
            border: 1px solid #222222;
            border-left: 6px solid #00ff66;
            font-size: 11px;
            letter-spacing: 1px;
            text-transform: uppercase;
            font-weight: bold;
        }
        .status-badge { font-weight: bold; color: #00ff66; }
        label { display: block; font-weight: bold; margin-bottom: 10px; color: #666666; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; }
        input[type="text"], textarea, input[type="number"] {
            width: 100%; padding: 14px; background: #000000; color: #ffffff;
            border: 1px solid #222222; border-radius: 0px; box-sizing: border-box;
            font-family: 'Courier New', monospace; margin-bottom: 20px; font-size: 14px;
            font-weight: bold;
        }
        input[type="text"]:focus, textarea:focus { border-color: #00ff66; outline: none; background: #000000; color: #00ff66; }
        .btn-wrapper { display: flex; justify-content: flex-end; gap: 15px; }
        button {
            background: #000000; color: #000000; border: 2px solid #ffffff;
            background-color: #ffffff;
            border-radius: 0px; padding: 14px 32px; cursor: pointer;
            font-family: 'Courier New', monospace; font-weight: 900; font-size: 13px;
            text-transform: uppercase; letter-spacing: 1px; transition: 0.2s;
        }
        button:hover { background: #000000; color: #ffffff; border-color: #ffffff; }
        .btn-harvester { background-color: #00ff66; border-color: #00ff66; color: #000000; }
        .btn-harvester:hover { background: #000000; color: #00ff66; border-color: #00ff66; }
        .btn-export { background-color: #007bff; border-color: #007bff; color: #ffffff; }
        .btn-export:hover { background: #000000; color: #007bff; border-color: #007bff; }
        .opium-output {
            background: #000000; border: 1px solid #222222; padding: 20px;
            border-radius: 0px; white-space: pre-wrap; color: #ffffff;
            min-height: 50px; margin-top: 20px; font-size: 14px; line-height: 1.6;
            border-left: 3px solid #ffffff;
        }
    </style>
</head>
<body>
    <div class="vault-container">
        <h1>FONTANA // ANTAGONIST.CORE</h1>

        <div class="status-strip">
            <span style="color: #888888;">SYS_DAEMON: ACTIVE_IN_RAM</span>
            <span class="status-badge">REST_GATEWAY: ONLINE // 108_BPE</span>
        </div>

        <div class="matrix-grid">
            <!-- SYNTHESIS BOX -->
            <div class="vamp-card">
                <h2>// STOCHASTIC SYNTHESIS</h2>
                <label>Prompt Seed Phrase:</label>
                <input type="text" id="seedInput" value="Fontana">

                <label>Sequence Token Length Bounds:</label>
                <input type="number" id="lengthInput" value="75" min="5" max="150">

                <div class="btn-wrapper">
                    <button onclick="exportToMarkdown()" class="btn-export">Export Script</button>
                    <button onclick="triggerGeneration()">Execute Pass</button>
                </div>
                <div class="opium-output" id="generationOutput">Awaiting vector matrix trajectory injection...</div>
            </div>

            <!-- HARVESTER BOX -->
            <div class="vamp-card">
                <h2>// DIALOGUE HARVESTER</h2>
                <label>Ingest Multi-Source Text Coordinates:</label>
                <textarea id="trainInput" rows="5" placeholder="PASTE SCREENPLAY BLOCKS HERE..."></textarea>

                <div class="btn-wrapper">
                    <button onclick="triggerTraining()" class="btn-harvester">Commit Tracks</button>
                </div>
                <div class="opium-output" id="trainingOutput">Awaiting text trajectory data stream blocks...</div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = "http://127.0.0.1:8000";
        let capturedLogHistory = [];

        async function triggerGeneration() {
            const outBox = document.getElementById("generationOutput");
            outBox.innerHTML = "<span style='color: #666666;'>Streaming 512-HD tensor spaces...</span>";

            try {
                const response = await fetch(`${API_BASE}/v1/generate`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        seed: document.getElementById("seedInput").value,
                        max_tokens: parseInt(document.getElementById("lengthInput").value)
                    })
                });
                const data = await response.json();
                if (response.ok) {
                    outBox.innerText = data.completed_text;
                    capturedLogHistory.push(data.completed_text);
                } else {
                    outBox.innerText = `❌ CORE ERROR: ${data.detail}`;
                }
            } catch (err) {
                outBox.innerText = `❌ BUS SECTOR BREAK: ${err.message}`;
            }
        }

        async function triggerTraining() {
            const outBox = document.getElementById("trainingOutput");
            outBox.innerHTML = "<span style='color: #666666;'>Compressing text stream into memory cells...</span>";

            try {
                const response = await fetch(`${API_BASE}/v1/train`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: document.getElementById("trainInput").value })
                });
                const data = await response.json();
                if (response.ok) {
                    outBox.innerHTML = `<span style='color: #00ff66;'>🌟 HARVEST COMPLETE: ${data.message}</span>\nWords processing: ${data.words_processed}`;
                    document.getElementById("trainInput").value = "";
                } else {
                    outBox.innerText = `❌ BOUNDARY ERROR: ${data.detail}`;
                }
            } catch (err) {
                outBox.innerText = `❌ BUS SECTOR BREAK: ${err.message}`;
            }
        }

        function exportToMarkdown() {
            if (capturedLogHistory.length === 0) {
                alert("Vault stream empty! Generate text blocks before exporting.");
                return;
            }

            // Format logs cleanly into structured screenplay blocks
            let markdownContent = `# FONTANA SCENARIO LOG\n\nGenerated via Antagonist.Core\n\n---\n\n`;
            capturedLogHistory.forEach((block, index) => {
                markdownContent += `### SEQUENCE ${index + 1}\n\n${block}\n\n`;
            });

            const blob = new Blob([markdownContent], { type: 'text/markdown' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `fontana_vault_scene_${Date.now()}.md`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }
    </script>
</body>
</html>
