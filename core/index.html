<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🧭 THE FONTANA ENGINE CORE DASHBOARD</title>
    <style>
        body { font-family: 'Courier New', monospace; background: #090d16; color: #c9d1d9; padding: 30px; margin: 0; }
        .container { max-width: 900px; margin: 0 auto; background: #0d1117; border: 2px solid #30363d; border-radius: 8px; padding: 30px; box-shadow: 0 8px 32px rgba(0,0,0,0.5); }
        h1 { color: #58a6ff; border-bottom: 2px solid #21262d; padding-bottom: 12px; margin-top: 0; font-size: 24px; letter-spacing: 1px; }
        h2 { color: #ff7b72; font-size: 18px; margin-top: 0; margin-bottom: 15px; text-transform: uppercase; letter-spacing: 0.5px; }
        .grid-layout { display: grid; grid-template-columns: 1fr; gap: 30px; margin-top: 20px; }
        .card { background: #161b22; border: 1px solid #30363d; border-radius: 6px; padding: 20px; }
        .status-strip { display: flex; align-items: center; justify-content: space-between; background: #21262d; padding: 10px 15px; border-radius: 6px; margin-bottom: 25px; border-left: 4px solid #238636; }
        .status-badge { font-weight: bold; font-size: 12px; color: #56d364; text-transform: uppercase; }
        label { display: block; font-weight: bold; margin-bottom: 8px; color: #8b949e; font-size: 13px; }
        input[type="text"], textarea, input[type="number"] {
            width: 100%; padding: 12px; background: #090d16; color: #79c0ff;
            border: 1px solid #30363d; border-radius: 6px; box-sizing: border-box; font-family: 'Courier New', monospace; margin-bottom: 15px; font-size: 14px;
        }
        input[type="text"]:focus, textarea:focus { border-color: #58a6ff; outline: none; }
        .btn-group { display: flex; justify-content: flex-end; }
        button { background: #238636; color: #ffffff; border: 1px solid #30363d; border-radius: 6px; padding: 12px 24px; cursor: pointer; font-family: 'Courier New', monospace; font-weight: bold; font-size: 14px; text-transform: uppercase; transition: 0.2s; }
        button:hover { background: #2ea44f; box-shadow: 0 0 12px rgba(46,164,79,0.4); }
        .btn-train { background: #8957e5; border-color: #30363d; }
        .btn-train:hover { background: #a371f7; box-shadow: 0 0 12px rgba(137,87,229,0.4); }
        .output-box { background: #090d16; border: 1px solid #21262d; padding: 15px; border-radius: 6px; white-space: pre-wrap; color: #79c0ff; min-height: 50px; margin-top: 15px; font-size: 14px; line-height: 1.5; border-left: 3px solid #58a6ff; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧭 THE FONTANA ENGINE CORE CONTROL MANUAL</h1>

        <div class="status-strip">
            <span style="color: #8b949e; font-size: 13px;">IPC PIPELINE: ACTIVE IN RAM</span>
            <span class="status-badge">● REST GATEWAY: ONLINE</span>
        </div>

        <div class="grid-layout">
            <!-- GENERATION SUITE CARD -->
            <div class="card">
                <h2>🚀 Stochastic Synthesis Engine</h2>
                <label>Prompt Seed Phrase:</label>
                <input type="text" id="seedInput" value="Fontana">

                <label>Dynamic Output Generation Bounds (Tokens):</label>
                <input type="number" id="lengthInput" value="75" min="5" max="150">

                <div class="btn-group">
                    <button onclick="triggerGeneration()">Run RAM Matrix Pass</button>
                </div>
                <div class="output-box" id="generationOutput">System ready for vector prompt streams...</div>
            </div>

            <!-- MULTILINE DIALOGUE HARVESTER CARD -->
            <div class="card">
                <h2>📝 Persistent Dialogue Harvester</h2>
                <label>Paste Script Blocks or Literature Sequences:</label>
                <textarea id="trainInput" rows="6" placeholder="Paste text tracks here... (Enforces strict 4-word parameter verification)"></textarea>

                <div class="btn-group">
                    <button onclick="triggerTraining()" class="btn-train">Commit Text to Disk Tracks</button>
                </div>
                <div class="output-box" id="trainingOutput">System ready to ingest multi-source context tokens...</div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = "http://127.0.0.1:8000";

        async function triggerGeneration() {
            const outBox = document.getElementById("generationOutput");
            outBox.innerHTML = "<span style='color: #8b949e;'>Evaluating 512-HD tensor vectors inside RAM...</span>";

            try {
                const response = await fetch(`${API_BASE}/v1/generate`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        seed: document.getElementById("seedInput").value,
                        max_tokens: parseInt(document.getElementById("lengthInput").value)
                    })
                });
                const data = await response.json();
                if (response.ok) {
                    outBox.innerText = data.completed_text;
                } else {
                    outBox.innerText = `❌ Gateway Exception: ${data.detail}`;
                }
            } catch (err) {
                outBox.innerText = `❌ Network Bus Failure: ${err.message}`;
            }
        }

        async function triggerTraining() {
            const outBox = document.getElementById("trainingOutput");
            outBox.innerHTML = "<span style='color: #8b949e;'>Invoking live runtime C++ training matrix connections...</span>";

            try {
                const response = await fetch(`${API_BASE}/v1/train`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: document.getElementById("trainInput").value })
                });
                const data = await response.json();
                if (response.ok) {
                    outBox.innerHTML = `<span style='color: #56d364;'>🌟 SUCCESS: ${data.message}</span>\nWords processed: ${data.words_processed}`;
                    document.getElementById("trainInput").value = "";
                } else {
                    outBox.innerText = `❌ Guardrail Exception: ${data.detail}`;
                }
            } catch (err) {
                outBox.innerText = `❌ Network Bus Failure: ${err.message}`;
            }
        }
    </script>
</body>
</html>
