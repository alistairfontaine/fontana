<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🧛 THE FONTANA ENGINE CORE // OPIUM VAULT</title>
    <style>
        @import url('https://googleapis.com');

        body {
            font-family: 'Space Mono', monospace;
            background: #030303;
            color: #d1d1d1;
            padding: 40px 20px;
            margin: 0;
            background-image: radial-gradient(circle at 50% 50%, #1a0008 0%, #030303 80%);
        }
        .vault-container {
            max-width: 850px;
            margin: 0 auto;
            background: #08080c;
            border: 2px solid #1c1c24;
            border-radius: 0px;
            padding: 40px;
            box-shadow: 0 0 50px rgba(255, 0, 85, 0.15);
            position: relative;
        }
        .vault-container::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
            background: linear-gradient(90deg, #ff0055, #3a0007, #ff0055);
        }
        h1 {
            font-family: 'Cinzel', serif;
            color: #ffffff;
            border-bottom: 1px dashed #3a0007;
            padding-bottom: 20px;
            margin-top: 0;
            font-size: 28px;
            letter-spacing: 3px;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.2);
            text-transform: uppercase;
        }
        h2 {
            font-family: 'Cinzel', serif;
            color: #ff0055;
            font-size: 16px;
            margin-top: 0;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 8px rgba(255, 0, 85, 0.4);
        }
        .matrix-grid { display: grid; grid-template-columns: 1fr; gap: 40px; margin-top: 30px; }
        .vamp-card {
            background: #050507;
            border: 1px solid #14141a;
            border-radius: 0px;
            padding: 25px;
            position: relative;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
        }
        .vamp-card:hover {
            border-color: #ff0055;
            box-shadow: 0 0 15px rgba(255, 0, 85, 0.1);
        }
        .status-strip {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #000000;
            padding: 12px 20px;
            margin-bottom: 35px;
            border: 1px solid #1a1a24;
            border-left: 4px solid #ff0055;
            font-size: 11px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        .status-badge { font-weight: bold; color: #ff0055; text-shadow: 0 0 5px #ff0055; }
        label { display: block; font-weight: bold; margin-bottom: 10px; color: #888899; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; }
        input[type="text"], textarea, input[type="number"] {
            width: 100%; padding: 14px; background: #020203; color: #ffffff;
            border: 1px solid #1c1c24; border-radius: 0px; box-sizing: border-box;
            font-family: 'Space Mono', monospace; margin-bottom: 20px; font-size: 13px;
            transition: 0.3s;
        }
        input[type="text"]:focus, textarea:focus { border-color: #ff0055; outline: none; background: #050508; color: #ff0055; }
        .btn-wrapper { display: flex; justify-content: flex-end; }
        button {
            background: #000000; color: #ffffff; border: 1px solid #ff0055;
            border-radius: 0px; padding: 14px 28px; cursor: pointer;
            font-family: 'Space Mono', monospace; font-weight: bold; font-size: 12px;
            text-transform: uppercase; letter-spacing: 2px; transition: 0.3s;
        }
        button:hover { background: #ff0055; color: #000000; box-shadow: 0 0 20px rgba(255, 0, 85, 0.6); }
        .btn-harvester { border-color: #ffffff; color: #ffffff; }
        .btn-harvester:hover { background: #ffffff; color: #000000; box-shadow: 0 0 20px rgba(255, 255, 255, 0.6); }
        .opium-output {
            background: #010102; border: 1px solid #111116; padding: 20px;
            border-radius: 0px; white-space: pre-wrap; color: #ffffff;
            min-height: 50px; margin-top: 20px; font-size: 13px; line-height: 1.6;
            border-left: 2px solid #ff0055; box-shadow: inset 0 0 15px rgba(0,0,0,0.9);
        }
    </style>
</head>
<body>
    <div class="vault-container">
        <h1>FONTANA // OPIUM_VAULT.SH</h1>

        <div class="status-strip">
            <span style="color: #666677;">MEM_DAEMON: OPERATIONAL_RAM</span>
            <span class="status-badge">V1_REST: ONLINE // BPE_ACTIVE</span>
        </div>

        <div class="matrix-grid">
            <!-- SYNTHESIS BOX -->
            <div class="vamp-card">
                <h2> // STOCHASTIC SYNTHESIS</h2>
                <label>Prompt Seed Phrase:</label>
                <input type="text" id="seedInput" value="Fontana">

                <label>Sequence Token Length Bounds:</label>
                <input type="number" id="lengthInput" value="75" min="5" max="150">

                <div class="btn-wrapper">
                    <button onclick="triggerGeneration()">Execute RAM Pass</button>
                </div>
                <div class="opium-output" id="generationOutput">Awaiting vector matrix trajectory injection...</div>
            </div>

            <!-- HARVESTER BOX -->
            <div class="vamp-card">
                <h2> // DIALOGUE HARVESTER</h2>
                <label>Ingest Multi-Source Text Coordinates:</label>
                <textarea id="trainInput" rows="5" placeholder="P A S T E  S C R I P T  B L O C K S  H E R E . . ."></textarea>

                <div class="btn-wrapper">
                    <button onclick="triggerTraining()" class="btn-harvester">Commit to Disk Tracks</button>
                </div>
                <div class="opium-output" id="trainingOutput">Awaiting text trajectory data stream blocks...</div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = "http://127.0.0.1:8000";

        async function triggerGeneration() {
            const outBox = document.getElementById("generationOutput");
            outBox.innerHTML = "<span style='color: #444455;'>Streaming 512-HD tensor spaces...</span>";

            try {
                const response = await fetch(`${API_BASE}/v1/generate`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        seed: document.getElementById("seedInput").value,
                        max_tokens: parseInt(document.getElementById("lengthInput").value)
                    })
                });
                const data = await response.json();
                if (response.ok) {
                    outBox.innerText = data.completed_text;
                } else {
                    outBox.innerText = `❌ CORE ERROR: ${data.detail}`;
                }
            } catch (err) {
                outBox.innerText = `❌ BUS SECTOR BREAK: ${err.message}`;
            }
        }

        async function triggerTraining() {
            const outBox = document.getElementById("trainingOutput");
            outBox.innerHTML = "<span style='color: #444455;'>Compressing text stream into memory cells...</span>";

            try {
                const response = await fetch(`${API_BASE}/v1/train`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: document.getElementById("trainInput").value })
                });
                const data = await response.json();
                if (response.ok) {
                    outBox.innerHTML = `<span style='color: #ff0055;'>🩸 HARVEST COMPLETE: ${data.message}</span>\nWords processing: ${data.words_processed}`;
                    document.getElementById("trainInput").value = "";
                } else {
                    outBox.innerText = `❌ BOUNDARY ERROR: ${data.detail}`;
                }
            } catch (err) {
                outBox.innerText = `❌ BUS SECTOR BREAK: ${err.message}`;
            }
        }
    </script>
</body>
</html>
